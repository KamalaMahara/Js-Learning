 <!-- Main Container -->
  <div class="container">

    <!-- Quote Card -->
    <div class="quote-card">

      <!-- Heading -->
      <h1 class="title">Daily Motivation</h1>

      <!-- Quote Section -->
      <div class="quote-box">
        <p class="quote-text">
          <i>
          “Success doesn’t come from what you do occasionally.
          It comes from what you do consistently.”</i>
        </p>

        <h3 class="author">- Marie Forleo</h3>
      </div>

      <!-- Buttons -->
      <div class="buttons">

        <!-- Generate New Quote -->
        <button class="new-quote-btn">
          New Quote
        </button>

        <!-- Copy Quote -->
        <button class="copy-btn">
          Copy
        </button>

        <!-- Share Quote -->
        <button class="share-btn">
          Share
        </button>

      </div>
      <span class="copy-msg" >Quote Copied!</span>

    </div>

  </div>
