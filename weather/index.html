<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

    <div class="weather-card">
        <div class="location-btn" id="location-btn">
                <i class="fa-solid fa-location-crosshairs"></i>
                <span>Allow location</span>
                 
            </div>
        <div class="search-box">
            <input type="text" placeholder="Search city...">
            <button id="search-btn">🔍</button>
            
        </div>
        


        <div class="weather-info">
            <h1 id="temperature">28°C</h1>
            <img id="weather-icon" src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="Weather">
            <h2 id="city">Kathmandu</h2>
            <p id="condition">Sunny</p>
            <p id="date">Monday, June 12, 2023</p>
        </div>

        <div class="details">
            <div class="detail-box">
                <h3 id="humidity">65%</h3>
                <p>Humidity</p>
            </div>

            <div class="detail-box">
                <h3 id="wind-speed">12 km/h</h3>
                <p>Wind Speed</p>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
